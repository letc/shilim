<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Page Admin — Shillim Institute</title>
    <link rel="stylesheet" href="shilim.css">
    <!-- CKEditor 5 Classic (CDN) -->
    <script src="https://cdn.ckeditor.com/ckeditor5/35.3.0/classic/ckeditor.js"></script>
</head>
<body class="page-admin-projectpage">
    <div class="container container--admin-projectpage">
        <h1>Project Page Admin</h1>
        
        <h2>Load Existing JSON</h2>
        <div class="form-group">
            <label>Upload JSON File</label>
            <input type="file" id="jsonFileInput" accept=".json">
            <button class="btn btn-secondary" onclick="loadFromFile()" style="margin-left: 10px;">Load from File</button>
        </div>
        <div class="form-group">
            <label>Or Load from URL</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="jsonUrlInput" placeholder="e.g., data/sampleprojectpage.json">
                <button class="btn btn-secondary" onclick="loadFromURL()">Load from URL</button>
            </div>
        </div>
        
        <h2>Artist Information</h2>
        <div class="form-group">
            <label for="author">Author/Artist Name</label>
            <input type="text" id="author" placeholder="Enter artist name">
        </div>
        
        <div class="form-group">
            <label for="artistdescription">Artist Bio</label>
            <div id="editor-artistbio" style="height:200px;"></div>
        </div>
        
        <h2>Projects</h2>
        <div id="projectsList"></div>
        <button class="btn btn-primary" onclick="addProject()">+ Add Project</button>
        
        <div class="actions actions--sticky">
            <button class="btn btn-success" onclick="generateJSON()">Generate JSON</button>
            <button class="btn btn-secondary" onclick="downloadJSON()">Download JSON</button>
        </div>
        
        <h2>JSON Preview</h2>
        <div class="json-preview">
            <pre id="jsonPreview">{}</pre>
        </div>
    </div>

    <script>
        let projects = [];

        window.loadFromFile = function() {
            const fileInput = document.getElementById('jsonFileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('Please select a file first');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    populateFromJSON(data);
                    alert('JSON loaded successfully!');
                } catch (error) {
                    alert('Error parsing JSON file: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        window.loadFromURL = async function() {
            const url = document.getElementById('jsonUrlInput').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch: ' + response.statusText);
                const data = await response.json();
                populateFromJSON(data);
                alert('JSON loaded successfully!');
            } catch (error) {
                alert('Error loading JSON: ' + error.message);
            }
        }

        // Convert plain text with newlines to HTML for CKEditor
        function textToHtml(text) {
            if (!text) return '';
            
            // First, handle literal \n sequences (escaped newlines in JSON strings)
            text = text.replace(/\\n/g, '\n');
            
            // Check if text already contains HTML tags
            const hasHtml = /<[^>]+>/.test(text);
            
            if (hasHtml) {
                // If HTML is present, just convert remaining \n to <br> tags
                return text.replace(/\n/g, '<br>');
            } else {
                // Convert plain text: newlines to paragraph breaks
                return text
                    .split('\n\n')
                    .map(para => '<p>' + para.replace(/\n/g, '<br>') + '</p>')
                    .join('');
            }
        }

        function setArtistBioData(bioText) {
            if (window.ckEditors && window.ckEditors['editor-artistbio']) {
                window.ckEditors['editor-artistbio'].setData(textToHtml(bioText));
            } else {
                // If editor not ready yet, retry after a short delay
                setTimeout(() => setArtistBioData(bioText), 100);
            }
        }

        function populateFromJSON(data) {
            // Populate artist info
            document.getElementById('author').value = data.author || '';
            // Set CKEditor data for artist bio (with retry if not ready)
            setArtistBioData(data.artistdescription || '');
            
            // Populate projects
            projects = [];
            if (data.projects && Array.isArray(data.projects)) {
                data.projects.forEach((project, index) => {
                    const newProject = {
                        id: Date.now() + index,
                        title: project.title || '',
                        startdate: project.startdate || '',
                        enddate: project.enddate || '',
                        sections: []
                    };
                    
                    if (project.sections && Array.isArray(project.sections)) {
                        project.sections.forEach((section, sIndex) => {
                            newProject.sections.push({
                                id: Date.now() + index * 1000 + sIndex,
                                sectiontype: section.sectiontype,
                                value: section.value
                            });
                        });
                    }
                    
                    projects.push(newProject);
                });
            }
            
            renderProjects();
        }

        window.addProject = function() {
            const project = {
                id: Date.now(),
                title: '',
                startdate: '',
                enddate: '',
                sections: []
            };
            projects.push(project);
            renderProjects();
        }

        window.removeProject = function(id) {
            projects = projects.filter(p => p.id !== id);
            renderProjects();
        }

        window.addSection = function(projectId, type = 'text') {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            const section = {
                id: Date.now(),
                sectiontype: type,
                value: type === 'image' ? [{ filename: '' }] : (type === 'video' ? { source: '', description: '' } : '')
            };
            project.sections.push(section);
            renderProjects();
        }

        window.removeSection = function(projectId, sectionId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            project.sections = project.sections.filter(s => s.id !== sectionId);
            renderProjects();
        }

        window.moveSection = function(projectId, sectionId, direction) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            
            const index = project.sections.findIndex(s => s.id === sectionId);
            if (index === -1) return;
            
            // Calculate new index
            const newIndex = index + direction;
            
            // Check bounds
            if (newIndex < 0 || newIndex >= project.sections.length) return;
            
            // Swap sections
            const temp = project.sections[index];
            project.sections[index] = project.sections[newIndex];
            project.sections[newIndex] = temp;
            
            renderProjects();
        }

        window.addImage = function(projectId, sectionId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const section = project.sections.find(s => s.id === sectionId);
            if (!section || section.sectiontype !== 'image') return;
            section.value.push({ filename: '' });
            renderProjects();
        }

        window.removeImage = function(projectId, sectionId, imageIndex) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const section = project.sections.find(s => s.id === sectionId);
            if (!section || section.sectiontype !== 'image') return;
            section.value.splice(imageIndex, 1);
            renderProjects();
        }

        window.updateValue = function(projectId, sectionId, field, value, imageIndex = null) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const section = project.sections.find(s => s.id === sectionId);
            if (!section) return;

            if (section.sectiontype === 'text') {
                section.value = value;
            } else if (section.sectiontype === 'image' && imageIndex !== null) {
                section.value[imageIndex].filename = value;
            } else if (section.sectiontype === 'video') {
                section.value[field] = value;
            }
        }

        window.renderProjects = function() {
            const container = document.getElementById('projectsList');
            // destroy existing CKEditor instances (but preserve Artist Bio editor)
            if (window.ckEditors) {
                Object.keys(window.ckEditors).forEach(k => {
                    // skip the Artist Bio editor, only destroy text section editors
                    if (k === 'editor-artistbio') return;
                    try { window.ckEditors[k].destroy().catch(() => {}); } catch (e) {}
                    try { window.ckEditors[k] = null; } catch (e) {}
                    delete window.ckEditors[k];
                });
            }
            container.innerHTML = '';

            projects.forEach((project, projectIndex) => {
                const projectCard = document.createElement('div');
                projectCard.className = 'project-card--admin';
                
                projectCard.innerHTML = `
                    <button class="btn btn-danger btn-circle" style="position: absolute; top: 10px; right: 10px;" onclick="removeProject(${project.id})" title="Remove project">×</button>
                    
                    <h3>Project ${projectIndex + 1}</h3>
                    
                    <div class="form-group">
                        <label>Project Title</label>
                        <input type="text" value="${project.title}" 
                            onchange="projects.find(p => p.id === ${project.id}).title = this.value">
                    </div>
                    
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" value="${project.startdate}"
                            onchange="projects.find(p => p.id === ${project.id}).startdate = this.value">
                    </div>
                    
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" value="${project.enddate}"
                            onchange="projects.find(p => p.id === ${project.id}).enddate = this.value">
                    </div>
                    
                    <h4>Sections</h4>
                    <div id="sections-${project.id}"></div>
                    
                    <select id="sectionType-${project.id}" class="btn">
                        <option value="text">Text</option>
                        <option value="image">Image</option>
                        <option value="video">Video</option>
                    </select>
                    <button class="btn btn-primary" onclick="addSection(${project.id}, document.getElementById('sectionType-${project.id}').value)">+ Add Section</button>
                `;
                
                container.appendChild(projectCard);
                
                // Render sections
                const sectionsContainer = document.getElementById(`sections-${project.id}`);
                project.sections.forEach((section, sectionIndex) => {
                    const sectionCard = document.createElement('div');
                    sectionCard.className = 'section-card';
                    
                    if (section.sectiontype === 'text') {
                        sectionCard.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <label style="margin: 0;"><strong>Text Section ${sectionIndex + 1}</strong></label>
                                <div style="display: flex; gap: 5px;">
                                    ${sectionIndex > 0 ? `<button class="btn btn-secondary" onclick="moveSection(${project.id}, ${section.id}, -1)" title="Move up">↑</button>` : ''}
                                    ${sectionIndex < project.sections.length - 1 ? `<button class="btn btn-secondary" onclick="moveSection(${project.id}, ${section.id}, 1)" title="Move down">↓</button>` : ''}
                                    <button class="btn btn-danger btn-circle" onclick="removeSection(${project.id}, ${section.id})" title="Remove section">×</button>
                                </div>
                            </div>
                            <div id="editor-container-${project.id}-${section.id}" style="height:200px;">
                                <div id="editor-${project.id}-${section.id}" style="height:100%;"></div>
                            </div>
                        `;
                        sectionsContainer.appendChild(sectionCard);

                        // initialize CKEditor Classic for this text section
                        window.ckEditors = window.ckEditors || {};
                        const editorId = `editor-${project.id}-${section.id}`;
                        setTimeout(() => {
                            try {
                                ClassicEditor.create(document.querySelector(`#${editorId}`), {
                                    toolbar: ['heading', '|', 'bold', 'italic', 'link', 'undo', 'redo']
                                }).then(editor => {
                                    // set initial data (convert plain text to HTML)
                                    editor.setData(textToHtml(section.value || ''));
                                    editor.model.document.on('change:data', () => {
                                        try { updateValue(project.id, section.id, null, editor.getData()); } catch (e) {}
                                    });
                                    window.ckEditors[editorId] = editor;
                                }).catch(err => console.warn('CKEditor init failed for', editorId, err));
                            } catch (e) {
                                console.warn('CKEditor setup error for', editorId, e);
                            }
                        }, 0);
                    
                    } else if (section.sectiontype === 'image') {
                        sectionCard.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <label style="margin: 0;"><strong>Image Section ${sectionIndex + 1}</strong></label>
                                <div style="display: flex; gap: 5px;">
                                    ${sectionIndex > 0 ? `<button class="btn btn-secondary" onclick="moveSection(${project.id}, ${section.id}, -1)" title="Move up">↑</button>` : ''}
                                    ${sectionIndex < project.sections.length - 1 ? `<button class="btn btn-secondary" onclick="moveSection(${project.id}, ${section.id}, 1)" title="Move down">↓</button>` : ''}
                                    <button class="btn btn-danger btn-circle" onclick="removeSection(${project.id}, ${section.id})" title="Remove section">×</button>
                                </div>
                            </div>
                            <div class="image-list" id="images-${section.id}"></div>
                            <button class="btn btn-secondary btn-sm" onclick="addImage(${project.id}, ${section.id})">+ Add Image</button>
                        `;
                        
                        sectionsContainer.appendChild(sectionCard);
                        
                        // Render images
                        const imagesContainer = document.getElementById(`images-${section.id}`);
                        section.value.forEach((image, imageIndex) => {
                            const imageItem = document.createElement('div');
                            imageItem.className = 'image-item';
                            imageItem.innerHTML = `
                                <input type="text" value="${image.filename}" placeholder="Image path/URL"
                                    onchange="updateValue(${project.id}, ${section.id}, null, this.value, ${imageIndex})">
                                <button class="btn btn-danger btn-circle" onclick="removeImage(${project.id}, ${section.id}, ${imageIndex})" title="Remove image">×</button>
                            `;
                            imagesContainer.appendChild(imageItem);
                        });
                    } else if (section.sectiontype === 'video') {
                        sectionCard.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <label style="margin: 0;"><strong>Video Section ${sectionIndex + 1}</strong></label>
                                <button class="btn btn-danger btn-circle" onclick="removeSection(${project.id}, ${section.id})" title="Remove section">×</button>
                            </div>
                            <div class="form-group">
                                <label>Video URL (YouTube/Vimeo/Direct)</label>
                                <input type="text" value="${section.value.source || ''}" placeholder="https://..."
                                    onchange="updateValue(${project.id}, ${section.id}, 'source', this.value)">
                            </div>
                            <div class="form-group">
                                <label>Description (Optional)</label>
                                <input type="text" value="${section.value.description || ''}" placeholder="Video description"
                                    onchange="updateValue(${project.id}, ${section.id}, 'description', this.value)">
                            </div>
                        `;
                        sectionsContainer.appendChild(sectionCard);
                    }
                });
            });
        }

        window.generateJSON = function() {
            const author = document.getElementById('author').value;
            // Get CKEditor data for artist bio
            let artistdescription = '';
            if (window.ckEditors && window.ckEditors['editor-artistbio']) {
                artistdescription = window.ckEditors['editor-artistbio'].getData();
            }

            const data = {
                author: author,
                artistdescription: artistdescription,
                projects: projects.map(p => ({
                    title: p.title,
                    startdate: p.startdate,
                    enddate: p.enddate,
                    sections: p.sections.map(s => ({
                        sectiontype: s.sectiontype,
                        value: s.value
                    }))
                }))
            };

            const jsonString = JSON.stringify(data, null, 2);
            document.getElementById('jsonPreview').textContent = jsonString;
            return data;
        }

        window.downloadJSON = function() {
            const data = generateJSON();
            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'projectpage.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // CKEditor instances are initialized per text section and update section.value on change
        
        // Initialize CKEditor for Artist Bio
        window.ckEditors = window.ckEditors || {};
        setTimeout(() => {
            try {
                ClassicEditor.create(document.querySelector('#editor-artistbio'), {
                    toolbar: ['heading', '|', 'bold', 'italic', 'link', 'undo', 'redo']
                }).then(editor => {
                    // set initial data
                    editor.setData('');
                    editor.model.document.on('change:data', () => {
                        try { /* artist bio updates are handled in generateJSON */ } catch (e) {}
                    });
                    window.ckEditors['editor-artistbio'] = editor;
                }).catch(err => console.warn('CKEditor init failed for Artist Bio', err));
            } catch (e) {
                console.warn('CKEditor setup error for Artist Bio', e);
            }
        }, 100);

        // Initialize with one project
        addProject();
    </script>
</body>
</html>
