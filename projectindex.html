<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self';">    <title>Project Index</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            padding: 0;
        }

        .container {
            width: 1550px;
            height: 1000px;
            max-width: 95vw;
            max-height: 95vh;
            aspect-ratio: 1550/1000;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
            background-color: white;
            z-index: 10;
        }

        .search-box {
            display: flex;
            flex: 1;
            gap: 20px;
            align-items: center;
        }

        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .search-box select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 14px;
            background-color: white;
            cursor: pointer;
            transition: border-color 0.3s ease;
            min-width: 160px;
        }
        
        .project-count {
            background-image: url('assets/white_circle_bg.png');
            background-size: cover;
            background-position: center;
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: auto;
            width: 40px;
            height: 40px;
        }
        
        .project-count span {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .search-box input:focus,
        .search-box select:focus {
            outline: none;
            border-color: #2196F3;
        }
        
        .search-box select:hover {
            border-color: #2196F3;
        }

        .content-wrapper {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }

        .left-section {
            flex: 1;
            min-width: 300px;
            overflow-y: auto;
            padding-right: 20px;
            border-right: 1px solid #eee;
            transition: flex 0.3s ease;
        }
        
        .left-section.full-width {
            flex: 1;
            border-right: none;
            padding-right: 0;
        }
        
        .left-section.half-width {
            flex: 0.5;
        }

        .right-section {
            flex: 0.5;
            min-width: 400px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
            display: none;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .right-section.visible {
            display: block;
        }
        
        .close-details {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #fff;
            border: 1px solid #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #666;
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .close-details:hover {
            background-color: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 10px;
        }
        
        .left-section.full-width .project-grid {
            grid-template-columns: repeat(3, 1fr);
        }

        .project-card {
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            height: fit-content;
        }

        .project-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-color: #2196F3;
        }

        .project-card.selected {
            border-color: #2196F3;
            background-color: #e3f2fd;
        }

        .project-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .project-card p {
            margin: 5px 0;
            color: #666;
        }

        .project-details {
            display: none;
        }

        .project-details.active {
            display: block;
        }

        .project-details h2 {
            margin-top: 0;
            color: #2196F3;
        }

        .details-section {
            margin-bottom: 20px;
        }

        .details-section h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .details-section p {
            line-height: 1.6;
            color: #666;
        }

        .project-thumbnail {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background-color: #e3f2fd;
            color: #2196F3;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .no-selection {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
            background-color: #f9f9f9;
            border-radius: 8px;
        }

        .no-results h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .no-results p {
            margin: 0;
            color: #666;
        }

        @media (max-width: 1024px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .search-box {
                flex-wrap: wrap;
            }
            
            .search-box input {
                flex: 1 1 100%;
                margin-bottom: 10px;
                margin-right: 0;
            }
            
            .search-box select {
                flex: 1 1 calc(50% - 5px);
                min-width: unset;
            }
            
            .search-box select:nth-of-type(1) {
                margin-right: 10px;
            }
            
            .project-count {
                flex: 1 1 100%;
                margin-top: 10px;
            }
        
            .content-wrapper {
                flex-direction: column;
            }

            .left-section {
                padding-right: 0;
                border-right: none;
                max-height: 50vh;
            }

            .right-section {
                min-width: 100%;
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Project Index</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search projects..." oninput="filterProjects()">
                <select id="primaryCategoryFilter" onchange="filterProjects()">
                    <option value="">All Primary Categories</option>
                    <option value="ART">ART</option>
                    <option value="COMMUNITY">COMMUNITY</option>
                    <option value="ECOLOGY">ECOLOGY</option>
                    <option value="RESEARCH">RESEARCH</option>
                    <option value="HEALTH">HEALTH</option>
                    <option value="EDUCATION">EDUCATION</option>
                </select>
                <select id="secondaryCategoryFilter" onchange="filterProjects()">
                    <option value="">All Secondary Categories</option>
                    <option value="ART">ART</option>
                    <option value="COMMUNITY">COMMUNITY</option>
                    <option value="ECOLOGY">ECOLOGY</option>
                    <option value="RESEARCH">RESEARCH</option>
                    <option value="HEALTH">HEALTH</option>
                    <option value="EDUCATION">EDUCATION</option>
                </select>
                <div class="project-count" id="projectCount">
                    <span id="projectCountText">0 Projects</span>
                </div>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="left-section full-width">
                <div class="project-grid" id="projectGrid">
                    <!-- Projects will be loaded here -->
                </div>
            </div>

            <div class="right-section" id="projectDetails">
                <button class="close-details" onclick="closeDetails()" title="Close details">×</button>
                <div class="no-selection">
                    <h3>Select a project to view details</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentProjects = [];
        let selectedProjectIndex = -1;

        async function loadProjects() {
            try {
                const response = await fetch('data/projects.json');
                const data = await response.json();
                currentProjects = data.projects || [];
                refreshProjectGrid();
            } catch (error) {
                console.error('Error loading projects:', error);
                alert('Error loading projects. Please check if projects.json exists.');
            }
        }

        function filterProjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const primaryCategory = document.getElementById('primaryCategoryFilter').value;
            const secondaryCategory = document.getElementById('secondaryCategoryFilter').value;
            refreshProjectGrid(searchTerm, primaryCategory, secondaryCategory);
        }

        function refreshProjectGrid(searchTerm = '', primaryCategory = '', secondaryCategory = '') {
            const projectGrid = document.getElementById('projectGrid');
            projectGrid.innerHTML = '';
            
            const filteredProjects = currentProjects.filter(project => {
                // Text search filter
                const matchesSearch = !searchTerm || 
                    project.title.toLowerCase().includes(searchTerm) ||
                    project.author.toLowerCase().includes(searchTerm) ||
                    project.primarycategory.toLowerCase().includes(searchTerm) ||
                    project.secondarycategory.toLowerCase().includes(searchTerm) ||
                    (project.shortdescription && project.shortdescription.toLowerCase().includes(searchTerm)) ||
                    project.details.toLowerCase().includes(searchTerm);
                
                // Primary category filter
                const matchesPrimary = !primaryCategory || 
                    project.primarycategory === primaryCategory;
                
                // Secondary category filter (check if it's in comma-separated list)
                const matchesSecondary = !secondaryCategory || 
                    project.secondarycategory.split(',').map(cat => cat.trim()).includes(secondaryCategory);
                
                return matchesSearch && matchesPrimary && matchesSecondary;
            });
            
            // Update project count
            const projectCountText = document.getElementById('projectCountText');
            projectCountText.textContent = `${filteredProjects.length}`;
            
            if (filteredProjects.length === 0) {
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.innerHTML = '<h3>No projects found</h3><p>Try adjusting your search terms</p>';
                projectGrid.appendChild(noResults);
                return;
            }

            filteredProjects.forEach(project => {
                // Find the actual index in currentProjects
                const originalIndex = currentProjects.findIndex(p => p.title === project.title);
                const card = document.createElement('div');
                card.className = `project-card ${originalIndex === selectedProjectIndex ? 'selected' : ''}`;
                card.onclick = () => selectProject(originalIndex);
                
                // Use short description or truncate details
                const displayText = project.shortdescription || 
                    (project.details.length > 100 ? project.details.substring(0, 100) + '...' : project.details);
                
                // Format date display
                const dateDisplay = project.startdate && project.enddate 
                    ? `${project.startdate} to ${project.enddate}` 
                    : project.date;
                
                // Thumbnail image HTML
                const thumbnailHtml = project.thumbnail 
                    ? `<img src="${project.thumbnail}" alt="${project.title}" onerror="this.style.display='none'">` 
                    : '';
                
                card.innerHTML = `
                    ${thumbnailHtml}
                    <h3>${project.title}</h3>
                    <p><strong>Author:</strong> ${project.author}</p>
                    <p><strong>Date:</strong> ${dateDisplay}</p>
                    <p>${displayText}</p>
                `;
                projectGrid.appendChild(card);
            });
        }

        function selectProject(index) {
            selectedProjectIndex = index;
            const project = currentProjects[index];
            
            // Show right section and adjust left section width
            const leftSection = document.querySelector('.left-section');
            const rightSection = document.getElementById('projectDetails');
            leftSection.classList.remove('full-width');
            leftSection.classList.add('half-width');
            rightSection.classList.add('visible');
            
            // Update selected state in grid
            document.querySelectorAll('.project-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });
            
            // Format date display
            const dateDisplay = project.startdate && project.enddate 
                ? `${project.startdate} to ${project.enddate}` 
                : project.date;
            
            // Thumbnail image HTML
            const thumbnailHtml = project.thumbnail 
                ? `<img src="${project.thumbnail}" alt="${project.title}" class="project-thumbnail" onerror="this.style.display='none'">` 
                : '';
            
            // Short description section
            const shortDescHtml = project.shortdescription 
                ? `<div class="details-section">
                    <h3>Summary</h3>
                    <p>${project.shortdescription}</p>
                </div>` 
                : '';
            
            // Update details section
            const detailsSection = document.getElementById('projectDetails');
            detailsSection.innerHTML = `
                <button class="close-details" onclick="closeDetails()" title="Close details">×</button>
                <h2>${project.title}</h2>
                ${thumbnailHtml}
                
                <div class="details-section">
                    <h3>Author</h3>
                    <p>${project.author}</p>
                </div>
                
                <div class="details-section">
                    <h3>Duration</h3>
                    <p>${dateDisplay}</p>
                </div>
                
                <div class="details-section">
                    <h3>Categories</h3>
                    <p>
                        <span class="tag">${project.primarycategory}</span>
                        ${project.secondarycategory.split(',').map(cat => 
                            `<span class="tag">${cat.trim()}</span>`
                        ).join('')}
                    </p>
                </div>
                
                ${shortDescHtml}
                
                <div class="details-section">
                    <h3>Description</h3>
                    <p>${project.details}</p>
                </div>
                
                <div class="details-section">
                    <h3>Link</h3>
                    <p><a href="${project.link}" target="_blank">${project.link}</a></p>
                </div>
            `;
            
            // Scroll the details into view on mobile
            if (window.innerWidth <= 768) {
                detailsSection.scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        function closeDetails() {
            const leftSection = document.querySelector('.left-section');
            const rightSection = document.getElementById('projectDetails');
            
            // Hide right section and expand left section
            rightSection.classList.remove('visible');
            leftSection.classList.remove('half-width');
            leftSection.classList.add('full-width');
            
            // Clear selection
            selectedProjectIndex = -1;
            document.querySelectorAll('.project-card').forEach(card => {
                card.classList.remove('selected');
            });
        }

        // Load projects when page loads
        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
